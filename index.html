<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOOKAH GLOBAL SYSTEM (HOK) - Web3 Hookah DAO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        img { max-width: 200px; margin-bottom: 30px; }
        h1 { font-size: 2.5em; margin-bottom: 20px; background: linear-gradient(90deg, #00d4ff, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        p { font-size: 1.2em; line-height: 1.6; margin-bottom: 20px; opacity: 0.9; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(90deg, #00d4ff, #ff00ff);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="HOK Logo">
        <h1>HOOKAH GLOBAL SYSTEM</h1>
        <p>The world's first DAO that merges hookah culture with Web3 economy on the TON blockchain.</p>
        <a href="https://ton.vote/" class="btn">Join the DAO</a>
    </div>
</body>
</html>
